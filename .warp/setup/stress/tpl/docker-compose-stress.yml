services:
  stress:
    image: "${WARP_STRESS_IMAGE:-grafana/k6:0.49.0}"
    user: "0:0"
    working_dir: /opt/warp-stress
    network_mode: bridge
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - trap exit TERM INT; while :; do sleep 3600; done
    labels:
      io.warp.role: stress
      io.warp.managed: "true"
    volumes:
      - ./.warp/docker/config/stress:/opt/warp-stress/config
      - ./var/warp-stress:/opt/warp-stress/var
