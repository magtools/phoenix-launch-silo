
  redis-fpc:
    image: ${CACHE_IMAGE_REPO:-redis}:${REDIS_FPC_VERSION}
    env_file: .env
    ports:
      - "6379"
    #volumes:
    #  - "./.warp/docker/volumes/redis-fpc:/data"
    volumes:
      - ${REDIS_FPC_CONF}:${CACHE_CONTAINER_CONFIG_PATH:-/usr/local/etc/redis/redis.conf}
    command:
      - ${CACHE_SERVER_BIN:-redis-server}
      - ${CACHE_CONTAINER_CONFIG_PATH:-/usr/local/etc/redis/redis.conf}
      - --maxmemory
      - ${REDIS_FPC_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_FPC_MAXMEMORY_POLICY:-allkeys-lru}
    networks:
      - back
