# Valkey configuration file for Warp local cache services.
#
# Warp keeps the legacy redis-* service names outside the container, but the
# runtime inside the container follows the selected engine contract.

bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300
daemonize no
supervised no
pidfile /var/run/valkey_6379.pid
loglevel notice
databases 16
always-show-logo no
set-proc-title yes
proc-title-template "{title} {listen-addr} {server-mode}"
dir /data
