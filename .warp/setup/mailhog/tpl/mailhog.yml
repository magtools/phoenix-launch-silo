
  mailhog:
    image: axllent/mailpit:${MAIL_VERSION}
    env_file: .env
    hostname: "mailhog"
    environment:
      MP_UI_AUTH_FILE: /mail-config/ui-auth.txt
      MP_DISABLE_VERSION_CHECK: 1
    volumes:
      - ./.warp/docker/config/mail:/mail-config:ro
    expose:
      - "1025"
    ports:
      - "127.0.0.1:${MAIL_BINDED_PORT}:8025"
    networks:
      - back
