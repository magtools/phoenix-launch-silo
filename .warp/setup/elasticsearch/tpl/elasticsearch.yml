
  elasticsearch:
    image: ${SEARCH_IMAGE:-opensearchproject/opensearch:${ES_VERSION}}
    env_file: .env
    ports:
      - "9200"
      - "9300"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms${ES_MEMORY} -Xmx${ES_MEMORY}"
      - "OPENSEARCH_JAVA_OPTS=-Xms${ES_MEMORY} -Xmx${ES_MEMORY}"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=${ES_PASSWORD}"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - "./.warp/docker/volumes/elasticsearch/data:${SEARCH_DATA_PATH:-/usr/share/opensearch/data}"
      - "${SEARCH_HOST_CONFIG_FILE:-./.warp/docker/config/opensearch/opensearch.yml}:${SEARCH_CONTAINER_CONFIG_PATH:-/usr/share/opensearch/config/opensearch.yml}"
    command: >
      bash -c "
      if [ \"${SEARCH_INSTALL_PHONETIC_PLUGIN:-1}\" = \"1\" ] && [ -n \"${SEARCH_PLUGIN_BIN}\" ]; then
        if ! ${SEARCH_PLUGIN_BIN} list | grep -qx 'analysis-phonetic'; then
          ${SEARCH_PLUGIN_BIN} install --batch analysis-phonetic;
        fi;
      fi &&
      exec ${SEARCH_SERVER_BIN:-/usr/share/opensearch/bin/opensearch}"
    networks:
      - back
